<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Gran Rifa de Premios</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  /* ── VARIABLES ── */
  :root {
    --bg:       #0d0d0f;
    --surface:  #16161a;
    --card:     #1e1e24;
    --border:   #2a2a34;
    --accent:   #ff5c2b;
    --accent2:  #ffb347;
    --text:     #f0ede8;
    --muted:    #7a7a8c;
    --green:    #2ddb81;
    --red:      #ff4d6d;
    --yellow:   #ffd166;
    --radius:   12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    min-height: 100vh;
  }

  /* ── LOGIN ── */
  #login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at 60% 40%, #2a1a0e 0%, #0d0d0f 70%);
  }

  .login-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px 40px;
    width: 100%;
    max-width: 380px;
    text-align: center;
  }

  .login-box .logo {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 4px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .login-box h1 {
    font-family: 'Syne', sans-serif;
    font-size: 26px;
    font-weight: 800;
    margin-bottom: 32px;
    line-height: 1.2;
  }

  .login-box input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    padding: 14px 16px;
    margin-bottom: 12px;
    outline: none;
    transition: border-color .2s;
  }

  .login-box input:focus { border-color: var(--accent); }

  .login-box button {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    padding: 14px;
    cursor: pointer;
    transition: opacity .2s;
    margin-top: 4px;
  }

  .login-box button:hover { opacity: .88; }
  #login-error { color: var(--red); font-size: 13px; margin-top: 10px; min-height: 18px; }

  /* ── DASHBOARD ── */
  #dashboard { display: none; }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  header .brand {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 18px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  header .brand span {
    background: var(--accent);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 3px 8px;
    border-radius: 4px;
    text-transform: uppercase;
  }

  header .actions { display: flex; gap: 10px; align-items: center; }

  .btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 16px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    transition: opacity .18s, transform .12s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .btn:hover { opacity: .85; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn-ghost { background: var(--card); color: var(--muted); border: 1px solid var(--border); }
  .btn-accent { background: var(--accent); color: #fff; }
  .btn-green  { background: var(--green);  color: #0d0d0f; font-weight: 600; }
  .btn-red    { background: var(--red);    color: #fff; }
  .btn-sm { padding: 6px 12px; font-size: 12px; }

  main { padding: 24px 20px; max-width: 100%; margin: 0 auto; }

  /* ── STATS ── */
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 16px;
    margin-bottom: 28px;
  }

  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 22px;
  }

  .stat-card .label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 6px;
  }

  .stat-card .value {
    font-family: 'Syne', sans-serif;
    font-size: 30px;
    font-weight: 800;
    line-height: 1;
  }

  .stat-card.c-orange .value { color: var(--accent); }
  .stat-card.c-green  .value { color: var(--green); }
  .stat-card.c-yellow .value { color: var(--yellow); }
  .stat-card.c-muted  .value { color: var(--muted); }

  /* ── TOOLBAR ── */
  .toolbar {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .toolbar input[type="text"] {
    flex: 1;
    min-width: 200px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 10px 16px;
    outline: none;
    transition: border-color .2s;
  }

  .toolbar input[type="text"]:focus { border-color: var(--accent); }

  .toolbar select {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 10px 14px;
    outline: none;
    cursor: pointer;
  }

  /* ── TABLE ── */
  .table-wrap {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow-x: auto;
  }

  table { width: 100%; border-collapse: collapse; }

  thead th {
    background: var(--surface);
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 10px 12px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background .15s;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(255,255,255,.025); }

  tbody td {
    padding: 10px 12px;
    font-size: 13px;
    vertical-align: middle;
  }

  .td-id { color: var(--muted); font-size: 11px; font-family: monospace; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .td-name { font-weight: 500; }
  .td-nums { font-size: 12px; color: var(--accent2); }

  /* ── BADGE ── */
  .badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: .5px;
  }

  .badge-pendiente { background: rgba(255,209,102,.15); color: var(--yellow); }
  .badge-publicado { background: rgba(45,219,129,.15);  color: var(--green); }
  .badge-rechazado { background: rgba(255,77,109,.15);  color: var(--red); }
  .badge-nubank  { background: rgba(130,10,209,.15); color: #820AD1; }

  /* ── ACTIONS CELL ── */
  .td-actions { display: flex; gap: 6px; flex-wrap: wrap; }

  /* ── MODAL (comprobante) ── */
  #modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.75);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }

  #modal-overlay.open { display: flex; }

  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    max-width: 560px;
    width: 90%;
    max-height: 90vh;
    overflow-y: auto;
  }

  .modal h2 {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 20px;
  }

  .modal .field { margin-bottom: 14px; }
  .modal .field label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 4px; }
  .modal .field p { font-size: 15px; }

  .modal img {
    width: 100%;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    margin-top: 8px;
  }

  .modal .modal-footer {
    margin-top: 24px;
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }

  /* ── EMPTY / LOADING ── */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  .empty .icon { font-size: 40px; margin-bottom: 12px; }
  .empty p { font-size: 15px; }

  #toast {
    position: fixed;
    bottom: 28px;
    right: 28px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 20px;
    font-size: 14px;
    font-weight: 500;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity .25s, transform .25s;
    z-index: 200;
    pointer-events: none;
    max-width: 300px;
  }

  #toast.show { opacity: 1; transform: translateY(0); }
  #toast.ok   { border-left: 4px solid var(--green); }
  #toast.err  { border-left: 4px solid var(--red); }

  @media (max-width: 700px) {
    main { padding: 12px; }
    header { padding: 12px 16px; }
    header h1 { font-size: 20px; }
    .header-actions { gap: 8px; }
    .btn { padding: 8px 14px; font-size: 13px; }

    .stats { grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 16px; }
    .stat-card { padding: 14px 16px; }
    .stat-card .value { font-size: 24px; }

    .toolbar { flex-direction: column; gap: 8px; }
    .toolbar input[type="text"] { width: 100%; min-width: unset; }
    .toolbar select { width: 100%; }

    /* Tabla → tarjetas en móvil */
    .table-wrap { background: transparent; border: none; }
    table, thead, tbody, th, td, tr { display: block; }
    thead { display: none; }

    tbody tr {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 12px;
      padding: 14px;
      position: relative;
    }
    tbody tr:hover { background: var(--card); }

    tbody td {
      padding: 4px 0;
      font-size: 13px;
      border: none;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }
    tbody td::before {
      content: attr(data-label);
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      min-width: 72px;
      padding-top: 2px;
    }
    .td-id { font-size: 11px; }
    .td-actions {
      flex-wrap: wrap;
      margin-top: 8px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }
    .td-actions::before { display: none; }
    .btn-sm { padding: 7px 12px; font-size: 12px; }

    #toast { bottom: 16px; right: 16px; left: 16px; max-width: unset; }
    .modal { padding: 20px; }
    .modal .modal-footer { flex-direction: column; }
  }
</style>
</head>
<body>

<!-- ══════════════════════════════════════════
     CONFIGURACIÓN — pon tu URL aquí abajo
════════════════════════════════════════════ -->
<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwIZqFX6N2OSb7Vxva_ZAkT4goqFAGl9NAuqEqbHaL4RvwRucQZUD5bT2jUpWlYAJ5uOA/exec';
  const ADMIN_PASS = 'rifa2026@';
</script>
<!-- ══════════════════════════════════════════ -->

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="logo">Gran Rifa</div>
    <h1>Panel de administración</h1>
    <input type="password" id="pass-input" placeholder="Contraseña de admin" />
    <button onclick="login()">Entrar</button>
    <div id="login-error"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

  <header>
    <div class="brand">
      Admin
      <span>Panel</span>
    </div>
    <div class="actions">
      <button class="btn btn-ghost" onclick="cargarRegistros()">↺ Actualizar</button>
      <button class="btn btn-ghost" onclick="exportarCSV()">⬇ CSV</button>
      <button class="btn btn-ghost" onclick="cerrarSesion()">Salir</button>
    </div>
  </header>

  <main>

    <!-- STATS -->
    <div class="stats">
      <div class="stat-card c-orange">
        <div class="label">Total registros</div>
        <div class="value" id="stat-total">—</div>
      </div>
      <div class="stat-card c-yellow">
        <div class="label">Pendientes</div>
        <div class="value" id="stat-pendientes">—</div>
      </div>
      <div class="stat-card c-green">
        <div class="label">Publicados</div>
        <div class="value" id="stat-publicados">—</div>
      </div>
      <div class="stat-card c-muted">
        <div class="label">Rechazados</div>
        <div class="value" id="stat-rechazados">—</div>
      </div>
    </div>

    <!-- TOOLBAR -->
    <div class="toolbar">
      <input type="text" id="buscar" placeholder="Buscar por nombre, correo o celular…" oninput="renderTabla()" />
      <select id="filtro-estado" onchange="renderTabla()">
        <option value="">Todos los estados</option>
        <option value="pendiente">Pendiente</option>
        <option value="publicado">Publicado</option>
        <option value="rechazado">Rechazado</option>
      </select>
    </div>

    <!-- TABLA -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Celular</th>
            <th>Correo</th>
            <th>Números</th>
            <th>Total</th>
            <th>Método</th>
            <th>Estado</th>
            <th>Fecha</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tabla-body"></tbody>
      </table>
    </div>

  </main>
</div>

<!-- MODAL DETALLE -->
<div id="modal-overlay" onclick="cerrarModal(event)">
  <div class="modal" id="modal-content">
    <h2 id="modal-titulo">Detalle del registro</h2>
    <div id="modal-body"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="cerrarModal()">Cerrar</button>
    </div>
  </div>
</div>

<!-- LIGHTBOX TESTIGO -->
<div id="lightbox" onclick="this.style.display='none'" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9999;align-items:center;justify-content:center;cursor:zoom-out;flex-direction:column;gap:12px">
  <img id="lightbox-img" src="" alt="Testigo" style="max-width:92vw;max-height:85vh;object-fit:contain;border-radius:10px;box-shadow:0 8px 40px rgba(0,0,0,.6)">
  <p style="color:rgba(255,255,255,.5);font-size:13px">Toca en cualquier lugar para cerrar</p>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ── ESTADO ──────────────────────────────────────
let registros = [];

// ── LOGIN ────────────────────────────────────────
function login() {
  const val = document.getElementById('pass-input').value.trim();
  if (val === ADMIN_PASS) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    cargarRegistros();
  } else {
    document.getElementById('login-error').textContent = 'Contraseña incorrecta.';
    document.getElementById('pass-input').value = '';
  }
}

document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('pass-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });
});

function cerrarSesion() {
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('pass-input').value = '';
  registros = [];
}

// ── CARGAR DATOS ─────────────────────────────────
async function cargarRegistros() {
  document.getElementById('tabla-body').innerHTML =
    '<tr><td colspan="10"><div class="empty"><div class="icon">⏳</div><p>Cargando registros…</p></div></td></tr>';

  try {
    const res = await fetch(SCRIPT_URL + '?action=list', {redirect:'follow'});
    const json = await res.json();

    if (!json.ok) throw new Error(json.error || 'Error desconocido');

    registros = json.data || [];
    actualizarStats();
    renderTabla();
    toast('Registros cargados correctamente', 'ok');
  } catch (err) {
    document.getElementById('tabla-body').innerHTML =
      '<tr><td colspan="10"><div class="empty"><div class="icon">⚠️</div><p>Error al cargar: ' + err.message + '</p></div></td></tr>';
    toast('Error: ' + err.message, 'err');
  }
}

// ── STATS ─────────────────────────────────────────
function actualizarStats() {
  document.getElementById('stat-total').textContent = registros.length;
  document.getElementById('stat-pendientes').textContent =
    registros.filter(r => (r.estado || 'pendiente') === 'pendiente').length;
  document.getElementById('stat-publicados').textContent =
    registros.filter(r => r.estado === 'publicado').length;
  document.getElementById('stat-rechazados').textContent =
    registros.filter(r => r.estado === 'rechazado').length;
}

// ── RENDER TABLA ──────────────────────────────────
function renderTabla() {
  const buscar = document.getElementById('buscar').value.toLowerCase();
  const filtro = document.getElementById('filtro-estado').value;

  let lista = registros.filter(r => {
    const texto = (r.nombre + r.correo + r.pais + r.id).toLowerCase();
    const matchBuscar = !buscar || texto.includes(buscar);
    const matchEstado = !filtro || (r.estado || 'pendiente') === filtro;
    return matchBuscar && matchEstado;
  });

  const tbody = document.getElementById('tabla-body');

  if (lista.length === 0) {
    tbody.innerHTML =
      '<tr><td colspan="10"><div class="empty"><div class="icon">📭</div><p>No hay registros con ese filtro.</p></div></td></tr>';
    return;
  }

  tbody.innerHTML = lista.map(r => {
    const estado = r.estado || 'pendiente';
    const nums   = Array.isArray(r.nums) ? r.nums.join(', ') : (r.nums || '—');
    const fecha  = r.fecha ? String(r.fecha).slice(0, 10) : '—';

    return `
    <tr>
      <td data-label="ID"><span class="td-id">${escHtml(String(r.id))}</span></td>
      <td data-label="Nombre"><span class="td-name">${escHtml(r.nombre)}</span></td>
      <td data-label="Celular">${escHtml(r.pais || '—')}</td>
      <td data-label="Correo" style="font-size:13px">${escHtml(r.correo)}</td>
      <td data-label="Números"><span class="td-nums">${escHtml(nums)}</span></td>
      <td data-label="Total">$${Number(r.total || 0).toLocaleString('es-CO')}</td>
      <td data-label="Método"><span class="badge badge-nubank">💜 Nu · Bre-B</span></td>
      <td data-label="Estado"><span class="badge badge-${estado}">${estado}</span></td>
      <td data-label="Fecha" style="font-size:12px;color:var(--muted)">${fecha}</td>
      <td>
        <div class="td-actions">
          <button class="btn btn-sm btn-ghost"    onclick="verDetalle('${escId(r.id)}')">Ver</button>
          <button class="btn btn-sm btn-green"    onclick="cambiarEstado('${escId(r.id)}','publicado')">Publicar</button>
          <button class="btn btn-sm btn-ghost"    onclick="cambiarEstado('${escId(r.id)}','rechazado')">Rechazar</button>
          <button class="btn btn-sm btn-red"      onclick="borrar('${escId(r.id)}')">Borrar</button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

// ── CAMBIAR ESTADO ────────────────────────────────
async function cambiarEstado(id, estado) {
  try {
    const url = SCRIPT_URL + '?action=status&id=' + encodeURIComponent(id) + '&estado=' + encodeURIComponent(estado);
    const res = await fetch(url, {redirect:'follow'});
    const json = await res.json();
    const reg = registros.find(r => String(r.id) === String(id));
    if (reg) reg.estado = estado;
    actualizarStats(); renderTabla();
    toast('Estado actualizado', 'ok');
  } catch(err) { toast('Error: ' + err.message, 'err'); }
}

// ── BORRAR ────────────────────────────────────────
async function borrar(id) {
  if (!confirm('¿Seguro que quieres borrar este registro?')) return;
  try {
    const url = SCRIPT_URL + '?action=delete&id=' + encodeURIComponent(id);
    const res = await fetch(url, {redirect:'follow'});
    const json = await res.json();
    registros = registros.filter(r => String(r.id) !== String(id));
    actualizarStats(); renderTabla();
    toast('Registro borrado', 'ok');
  } catch(err) { toast('Error: ' + err.message, 'err'); }
}

// ── VER DETALLE / COMPROBANTE ─────────────────────
function verDetalle(id) {
  const r = registros.find(r => String(r.id) === String(id));
  if (!r) return;

  const nums  = Array.isArray(r.nums) ? r.nums.join(', ') : (r.nums || '—');
  const fecha = r.fecha ? String(r.fecha).slice(0, 10) : '—';
  const comp  = r.comprobante || '';

  document.getElementById('modal-titulo').textContent = 'Detalle — ' + r.nombre;
  document.getElementById('modal-body').innerHTML = `
    <div class="field"><label>ID</label><p style="font-family:monospace">${escHtml(String(r.id))}</p></div>
    <div class="field"><label>Nombre</label><p>${escHtml(r.nombre)}</p></div>
    <div class="field"><label>Celular</label><p>${escHtml(r.pais || '—')}</p></div>
    <div class="field"><label>Correo</label><p>${escHtml(r.correo)}</p></div>
    <div class="field"><label>Números</label><p style="color:var(--accent2)">${escHtml(nums)}</p></div>
    <div class="field"><label>Total pagado</label><p>$${Number(r.total || 0).toLocaleString('es-CO')}</p></div>
    <div class="field"><label>Estado</label><p><span class="badge badge-${r.estado || 'pendiente'}">${r.estado || 'pendiente'}</span></p></div>
    <div class="field"><label>Fecha</label><p>${fecha}</p></div>
    <div class="field"><label>Método de pago</label>
      <p><span class="badge badge-nubank">💜 Nu · Bre-B</span></p>
    </div>
    <div class="field"><label>Comprobante del participante</label>
      ${comp
        ? (comp.startsWith('data:image') || comp.startsWith('/9j') || comp.length > 100
            ? `<img src="${comp.startsWith('data:') ? comp : 'data:image/jpeg;base64,'+comp}" alt="Comprobante" onclick="document.getElementById('lightbox-img').src=this.src;document.getElementById('lightbox').style.display='flex'" style="max-height:400px;width:100%;object-fit:contain;border-radius:10px;cursor:zoom-in" onerror="this.outerHTML='<p style=color:var(--muted)>No se pudo cargar la imagen.</p>'">`
            : comp.startsWith('http')
              ? `<img src="${escHtml(comp)}" alt="Comprobante" onclick="document.getElementById('lightbox-img').src=this.src;document.getElementById('lightbox').style.display='flex'" style="max-height:400px;width:100%;object-fit:contain;border-radius:10px;cursor:zoom-in" onerror="this.outerHTML='<p style=color:var(--muted)>No se pudo cargar la imagen.</p>'">`
              : `<p style="font-size:13px;color:var(--muted)">${escHtml(comp)}</p>`)
        : '<p style="color:var(--muted)">Sin comprobante</p>'}
    </div>
  `;

  document.getElementById('modal-overlay').classList.add('open');
}

function cerrarModal(e) {
  if (!e || e.target === document.getElementById('modal-overlay')) {
    document.getElementById('modal-overlay').classList.remove('open');
  }
}

// ── TOAST ─────────────────────────────────────────
function toast(msg, tipo) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + (tipo || 'ok');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.className = ''; }, 3000);
}

// ── UTILIDADES ────────────────────────────────────
function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function escId(id) {
  return String(id).replace(/'/g, "\\'");
}

function exportarCSV() {
  if (!registros.length) { toast('No hay registros para exportar', 'err'); return; }
  const cols = ['id','nombre','pais','correo','nums','total','metodo','estado','fecha'];
  const head = cols.join(',');
  const rows = registros.map(r =>
    cols.map(k => {
      let v = k === 'nums' ? (Array.isArray(r.nums) ? r.nums.join(' ') : (r.nums||'')) : (r[k]||'');
      return '"' + String(v).replace(/"/g,'""') + '"';
    }).join(',')
  );
  const csv = [head, ...rows].join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = 'registros-rifa.csv';
  a.click();
  toast('CSV exportado', 'ok');
}
</script>
